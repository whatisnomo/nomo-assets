<!DOCTYPE html>
<html>
<head>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      background: transparent;
      --poster-color: transparent;
    }
  </style>
</head>

<body>

<model-viewer
  src="https://raw.githubusercontent.com/whatisnomo/nomo-assets/main/oh_bl_chrome.glb"
  auto-rotate
  auto-rotate-delay="0"
  rotation-per-second="20deg"
  interaction-prompt="none"
  shadow-intensity="0"
  camera-orbit="0deg 75deg auto"
  environment-image="neutral">
</model-viewer>

</body>
</html>
