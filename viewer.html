<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      background: transparent;
      --poster-color: transparent;
    }
  </style>
</head>

<body>

<model-viewer
    src="https://github.com/whatisnomo/nomo-assets/oh_bl_chrome.glb"
    auto-rotate
    auto-rotate-delay="0"
    rotation-per-second="8deg"
    camera-controls="false"
    disable-zoom
    disable-pan
    interaction-prompt="none"
    tone-mapping="neutral"
    exposure="1.25"
    environment-image="https://modelviewer.dev/shared-assets/environments/commerce.hdr"
    shadow-intensity="0"
    style="background: transparent;">
</model-viewer>

</body>
</html>
